<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site de clima - Ryck Dev</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div class="caixa-maior">

<header class="header">
  <div class="logo-card">
    <img src="img/logo.jpg" class="logo-img">
    <h1>Climo Temp</h1>
  </div>

  <div class="brand-card">
    <span>by ©RyckzDev</span>
  </div>
</header>

<div class="area-pesquisa">
  <input class="input-buscar" type="text" placeholder="Digite a cidade">
  <button class="buscar" onclick="buscarCidade()">
    <img src="https://www.svgrepo.com/show/488200/find.svg">
  </button>
</div>

<div class="caixa-media">

  <div class="topo-clima">
    <h2 class="nome-cidade">Cidade</h2>
    <p class="hora-local">--:--</p>
  </div>

  <p class="graus">--°C</p>
  <p class="sensacao">Sensação: --°C</p>

  <div class="clima">
    <img class="icone-clima" src="">
    <p class="descricao">--</p>
  </div>

  <div class="detalhes">
    <div class="item">💧 <span class="umidade">--%</span></div>
    <div class="item">🌬️ <span class="vento">-- km/h</span></div>
    <div class="item">☁️ <span class="nuvens">--%</span></div>
    <div class="item">🌡️ <span class="minmax">-- / --</span></div>
  </div>

  <div class="extra">
  <div class="sun">
    <img src="img/sunrise.png" class="icon-sun">
    <span class="nascer">--:--</span>
  </div>

  <div class="sun">
    <img src="img/sunset.png" class="icon-sun">
    <span class="por">--:--</span>
  </div>
</div>

</div>

</div>

</body>
</html>
